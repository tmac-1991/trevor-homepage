<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trevor MacLean</title>
  <style>
    /* Reset a few browser defaults so spacing is predictable */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: #f5f4f0;
      color: #2b2b2b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background-color: #ffffff;
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .bio {
      font-size: 16px;
      line-height: 1.6;
      color: #555555;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .links a {
      display: block;
      text-decoration: none;
      color: #ffffff;
      background-color: #2b2b2b;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .links a:hover {
      background-color: #4a4a4a;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Trevor MacLean</h1>
    <p class="bio">
      I am a growth leader learning to become a product builder. I have great
      experience in marketing and sales, and now I'm taking my learnings and
      applying them to building delightful products for people.
    </p>
    <div class="links">
      <a href="https://linkedin.com/in/trevormacleanvancouver" target="_blank">LinkedIn</a>
      <a href="https://github.com/tmac-1991" target="_blank">GitHub</a>
      <a href="mailto:trevmaclean@gmail.com">Email</a>
    </div>
  </div>

</body>
</html>
